<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compteur calorique & recettes</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Macros">
  <meta name="theme-color" content="#0f0f11">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">

<style>
:root {
  --bg: #0f0f11;
  --bg2: #161619;
  --bg3: #1e1e22;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f2;
  --text2: #9898a8;
  --text3: #55556a;
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.1);
  --orange: #fb923c;
  --orange-bg: rgba(251,146,60,0.1);
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,0.1);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
  --warn: #fbbf24;
  --warn-bg: rgba(251,191,36,0.1);
  --radius: 10px;
  --font: 'Segoe UI', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }
button { font-family: var(--font); font-size: 14px; cursor: pointer; }
.container { max-width: 640px; margin: 0 auto; padding: 14px 12px; }
.rcard { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.rhead { padding: 13px 15px; cursor: pointer; display: flex; gap: 11px; align-items: flex-start; }
.rhead:hover, .chead:hover { background: var(--bg3); }
.catcard { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.chead { padding: 11px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 500; }
.irow { display: flex; justify-content: space-between; align-items: center; padding: 7px 15px; border-top: 0.5px solid var(--border); font-size: 13px; color: var(--text2); }
.irow.urg { background: var(--red-bg); }
.meal-tabs { display: flex; overflow-x: auto; border-bottom: 0.5px solid var(--border); margin-bottom: 14px; scrollbar-width: none; gap: 0; }
.meal-tabs::-webkit-scrollbar { display: none; }
.chip { display: inline-flex; align-items: center; gap: 3px; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 500; }
</style>
</head>
<body>

<!-- Settings modal -->
<div id="set-overlay" onclick="if(event.target===this)closeSettings()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;padding:16px;">
  <div style="background:#161619;border:0.5px solid rgba(255,255,255,.1);border-radius:14px;padding:24px;width:100%;max-width:380px;">
    <div style="font-size:16px;font-weight:600;color:#f0f0f2;margin-bottom:6px;">⚙ Clé API Google Gemini</div>
    <div style="font-size:12px;color:#9898a8;margin-bottom:16px;">Gratuit — 1 500 requêtes/jour sans carte bancaire. Crée ta clé sur <a href="https://aistudio.google.com/apikey" target="_blank" style="color:#60a5fa;">aistudio.google.com/apikey</a></div>
    <input type="password" id="api-key-input" placeholder="AIzaSy..." style="width:100%;padding:10px 12px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.12);border-radius:8px;color:#f0f0f2;font-size:13px;font-family:inherit;outline:none;margin-bottom:12px;box-sizing:border-box;">
    <div style="display:flex;gap:8px;">
      <button onclick="saveApiKey()" style="flex:1;padding:10px;background:#4ade80;border:none;border-radius:8px;color:#0f0f11;font-size:13px;font-weight:600;cursor:pointer;">Enregistrer</button>
      <button onclick="closeSettings()" style="padding:10px 14px;background:transparent;border:0.5px solid rgba(255,255,255,.12);border-radius:8px;color:#9898a8;font-size:13px;cursor:pointer;">Annuler</button>
    </div>
    <button onclick="clearApiKey()" style="margin-top:10px;background:none;border:none;color:#f87171;font-size:12px;cursor:pointer;width:100%;text-align:center;">Supprimer la clé</button>
  </div>
</div>

<!-- Photo analysis modal -->
<div id="photo-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:center;justify-content:center;padding:16px;">
  <div style="background:#161619;border:0.5px solid rgba(255,255,255,.1);border-radius:14px;padding:20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;">
    <div style="font-size:15px;font-weight:600;color:#f0f0f2;margin-bottom:12px;">📷 Analyse de l'assiette</div>
    <img id="photo-preview" style="width:100%;border-radius:8px;margin-bottom:12px;display:none;object-fit:cover;max-height:260px;">
    <div id="photo-status" style="font-size:13px;color:#9898a8;margin-bottom:8px;min-height:20px;"></div>
    <div id="photo-result" style="display:none;">
      <div style="margin-bottom:10px;">
        <label style="font-size:10px;color:#55556a;text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:4px;">Description du repas</label>
        <input id="photo-name" type="text" style="width:100%;padding:8px 10px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:8px;color:#f0f0f2;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box;">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:16px;">
        <div><label style="font-size:10px;color:#55556a;display:block;margin-bottom:3px;">Kcal</label><input id="photo-kcal" type="number" style="width:100%;padding:7px 8px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:6px;color:#fb923c;font-size:13px;outline:none;box-sizing:border-box;"></div>
        <div><label style="font-size:10px;color:#55556a;display:block;margin-bottom:3px;">Prot. g</label><input id="photo-prot" type="number" style="width:100%;padding:7px 8px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:6px;color:#4ade80;font-size:13px;outline:none;box-sizing:border-box;"></div>
        <div><label style="font-size:10px;color:#55556a;display:block;margin-bottom:3px;">Gluc. g</label><input id="photo-gluc" type="number" style="width:100%;padding:7px 8px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:6px;color:#60a5fa;font-size:13px;outline:none;box-sizing:border-box;"></div>
        <div><label style="font-size:10px;color:#55556a;display:block;margin-bottom:3px;">Lip. g</label><input id="photo-lip" type="number" style="width:100%;padding:7px 8px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:6px;color:#9898a8;font-size:13px;outline:none;box-sizing:border-box;"></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="confirmPhotoMeal()" style="flex:1;padding:10px;background:#4ade80;border:none;border-radius:8px;color:#0f0f11;font-size:13px;font-weight:600;cursor:pointer;">✓ Ajouter au tracker</button>
        <button onclick="closePhoto()" style="padding:10px 14px;background:transparent;border:0.5px solid rgba(255,255,255,.1);border-radius:8px;color:#9898a8;font-size:13px;cursor:pointer;">✕</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button onclick="document.getElementById('photo-input').click()" style="flex:1;padding:9px;background:transparent;border:0.5px solid rgba(255,255,255,.1);border-radius:8px;color:#9898a8;font-size:12px;cursor:pointer;">Autre photo</button>
      <button onclick="closePhoto()" style="padding:9px 14px;background:transparent;border:0.5px solid rgba(255,255,255,.1);border-radius:8px;color:#9898a8;font-size:12px;cursor:pointer;">Fermer</button>
    </div>
  </div>
</div>

<input type="file" id="photo-input" accept="image/*" style="display:none" onchange="handlePhotoSelected(this)">

<!-- Add-meal modal (text + photo + inventory) -->
<div id="addmeal-overlay" onclick="if(event.target===this)closeAddMeal()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:flex-end;justify-content:center;">
  <div style="background:#161619;border-top:0.5px solid rgba(255,255,255,.1);border-radius:14px 14px 0 0;padding:20px 20px 32px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div id="addmeal-title" style="font-size:15px;font-weight:600;color:#f0f0f2;">Ajouter un repas</div>
      <button onclick="closeAddMeal()" style="background:none;border:none;color:#9898a8;font-size:20px;cursor:pointer;line-height:1;">✕</button>
    </div>
    <img id="addmeal-photo-preview" style="display:none;width:100%;border-radius:8px;margin-bottom:12px;max-height:200px;object-fit:cover;">
    <!-- Input state -->
    <div id="addmeal-input">
      <label style="font-size:10px;color:#55556a;text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:6px;">Décris ce que tu as mangé</label>
      <textarea id="addmeal-textarea" placeholder="Ex: 200g de poulet grillé avec 100g de riz basmati, légumes sautés à l'huile d'olive..." style="width:100%;height:90px;padding:10px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.12);border-radius:8px;color:#f0f0f2;font-size:13px;font-family:inherit;resize:none;outline:none;box-sizing:border-box;margin-bottom:10px;"></textarea>
      <button onclick="startAddMealAnalysis('text')" style="width:100%;padding:12px;background:#4ade80;border:none;border-radius:8px;color:#0f0f11;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:10px;">✦ Analyser par IA</button>
      <div style="text-align:center;color:#55556a;font-size:12px;margin-bottom:10px;">— ou —</div>
      <button onclick="startAddMealAnalysis('photo')" style="width:100%;padding:11px;background:transparent;border:0.5px solid rgba(255,255,255,.12);border-radius:8px;color:#9898a8;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">📷 Analyser une photo</button>
    </div>
    <!-- Analyzing state -->
    <div id="addmeal-analyzing" style="display:none;text-align:center;padding:24px 0;">
      <div style="font-size:28px;margin-bottom:10px;">🔍</div>
      <div style="font-size:13px;color:#9898a8;">Analyse en cours…</div>
    </div>
    <!-- Confirm state -->
    <div id="addmeal-confirm" style="display:none;">
      <div style="margin-bottom:10px;">
        <label style="font-size:10px;color:#55556a;text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:4px;">Repas</label>
        <input id="addmeal-name" type="text" style="width:100%;padding:8px 10px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:8px;color:#f0f0f2;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box;">
      </div>

        <div><label style="font-size:10px;color:#55556a;display:block;margin-bottom:3px;">Prot. g</label><input id="addmeal-prot" type="number" style="width:100%;padding:7px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:6px;color:#4ade80;font-size:13px;outline:none;box-sizing:border-box;"></div>
        <div><label style="font-size:10px;color:#55556a;display:block;margin-bottom:3px;">Gluc. g</label><input id="addmeal-gluc" type="number" style="width:100%;padding:7px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:6px;color:#60a5fa;font-size:13px;outline:none;box-sizing:border-box;"></div>
        <div><label style="font-size:10px;color:#55556a;display:block;margin-bottom:3px;">Lip. g</label><input id="addmeal-lip" type="number" style="width:100%;padding:7px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:6px;color:#9898a8;font-size:13px;outline:none;box-sizing:border-box;"></div>
      </div>
      <div style="margin-bottom:14px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <label style="font-size:11px;color:#55556a;text-transform:uppercase;letter-spacing:.07em;">Déduire de l'inventaire ?</label>
          <div style="display:flex;gap:6px;" id="inv-toggle-btns">
            <button id="inv-yes-btn" onclick="setInvMode(true)" style="padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;background:transparent;border:0.5px solid rgba(255,255,255,.12);color:#9898a8;">Oui</button>
            <button id="inv-no-btn" onclick="setInvMode(false)" style="padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;background:#1e1e22;border:0.5px solid rgba(255,255,255,.2);color:#f0f0f2;">Non ✓</button>
          </div>
        </div>
        <div id="inv-items-section" style="display:none;"></div>
      </div>
      <button onclick="confirmAddMealFinal()" style="width:100%;padding:12px;background:#4ade80;border:none;border-radius:8px;color:#0f0f11;font-size:13px;font-weight:600;cursor:pointer;">✓ Ajouter au tracker</button>
    </div>
    <input type="file" id="addmeal-photo-input" accept="image/*" style="display:none" onchange="handleAddMealPhoto(this)">
  </div>
</div>

<!-- Free meal entry modal -->
<div id="free-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:center;justify-content:center;padding:12px;">
  <div style="background:#161619;border:0.5px solid rgba(255,255,255,.1);border-radius:14px;padding:20px;width:100%;max-width:440px;max-height:92vh;overflow-y:auto;">
    <div style="font-size:15px;font-weight:600;color:#f0f0f2;margin-bottom:14px;">➕ Ajouter un repas libre</div>

    <!-- STEP: input -->
    <div id="fs-input">
      <textarea id="free-text" rows="4" placeholder="Décris ce que tu as mangé... ex: 200g de pâtes bolognaise maison avec du fromage râpé et une salade verte" style="width:100%;padding:10px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.12);border-radius:8px;color:#f0f0f2;font-size:13px;font-family:inherit;outline:none;resize:none;box-sizing:border-box;"></textarea>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button onclick="analyzeFreeText()" style="flex:1;padding:10px;background:#60a5fa;border:none;border-radius:8px;color:#0f0f11;font-size:13px;font-weight:600;cursor:pointer;">✦ Analyser le texte</button>

        <button onclick="closeFreeOverlay()" style="padding:10px 12px;background:transparent;border:0.5px solid rgba(255,255,255,.1);border-radius:8px;color:#55556a;font-size:13px;cursor:pointer;">✕</button>
      </div>
    </div>

    <!-- STEP: loading -->
    <div id="fs-loading" style="display:none;padding:24px 0;text-align:center;">
      <div style="font-size:14px;color:#9898a8;">🔍 Analyse en cours…</div>
    </div>

    <!-- STEP: review -->
    <div id="fs-review" style="display:none;">
      <div style="margin-bottom:10px;">
        <label style="font-size:10px;color:#55556a;text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:4px;">Repas</label>
        <input id="free-name" type="text" style="width:100%;padding:8px 10px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:8px;color:#f0f0f2;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box;">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:14px;">
        <div><label style="font-size:10px;color:#55556a;display:block;margin-bottom:3px;">Kcal</label><input id="free-kcal" type="number" style="width:100%;padding:7px 8px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:6px;color:#fb923c;font-size:13px;outline:none;box-sizing:border-box;"></div>
        <div><label style="font-size:10px;color:#55556a;display:block;margin-bottom:3px;">Prot. g</label><input id="free-prot" type="number" style="width:100%;padding:7px 8px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:6px;color:#4ade80;font-size:13px;outline:none;box-sizing:border-box;"></div>

      </div>

      <!-- Inventory toggle -->
      <label style="display:flex;align-items:center;gap:10px;padding:10px;background:#0f0f11;border-radius:8px;cursor:pointer;margin-bottom:10px;">
        <input type="checkbox" id="free-use-inv" onchange="toggleFreeInv()" style="width:16px;height:16px;accent-color:#4ade80;cursor:pointer;">
        <span style="font-size:13px;color:#9898a8;">Retirer des ingrédients du stock</span>

      <div id="free-inv-box" style="display:none;margin-bottom:12px;">
        <input type="text" id="free-inv-search" placeholder="Chercher un ingrédient…" oninput="renderFreeInv()" style="width:100%;padding:7px 10px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:8px;color:#f0f0f2;font-size:12px;font-family:inherit;outline:none;box-sizing:border-box;margin-bottom:6px;">
        <div id="free-inv-list" style="max-height:180px;overflow-y:auto;border:0.5px solid rgba(255,255,255,.08);border-radius:8px;padding:4px 8px;"></div>
      </div>

      <div style="display:flex;gap:8px;">
        <button onclick="confirmFreeEntry()" style="flex:1;padding:10px;background:#4ade80;border:none;border-radius:8px;color:#0f0f11;font-size:13px;font-weight:600;cursor:pointer;">✓ Ajouter au tracker</button>
        <button onclick="openFreeInput()" style="padding:10px 12px;background:transparent;border:0.5px solid rgba(255,255,255,.1);border-radius:8px;color:#9898a8;font-size:13px;cursor:pointer;">← Retour</button>
        <button onclick="closeFreeOverlay()" style="padding:10px 12px;background:transparent;border:0.5px solid rgba(255,255,255,.1);border-radius:8px;color:#55556a;font-size:13px;cursor:pointer;">✕</button>
      </div>
    </div>
  </div>
</div>
<input type="file" id="free-photo-input" accept="image/*" style="display:none" onchange="handleFreePhoto(this)">
<div id="root" class="container"><div style="padding:2rem;text-align:center;color:var(--text3);">Chargement...</div></div>
<script>

  const lastMsg=messages[messages.length-1];
  let parts=[];
  if(typeof lastMsg.content==='string'){
    parts=[{text:lastMsg.content}];
  }else if(Array.isArray(lastMsg.content)){
    parts=lastMsg.content.map(p=>{
      if(p.type==='text')return{text:p.text};
      if(p.type==='image')return{inlineData:{mimeType:p.source.media_type,data:p.source.data}};
      return null;
    }).filter(Boolean);
  }
  const body={
    contents:[{parts}],
    generationConfig:{maxOutputTokens:maxTokens,temperature:0.2}
  };
  if(system)body.systemInstruction={parts:[{text:system}]};
  let resp,data;
  try{
    resp=await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
      {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}
    );
    data=await resp.json();
  }catch(netErr){throw new Error('NETWORK:'+netErr.message);}
  if(data.error)throw new Error('API:'+(data.error.message||JSON.stringify(data.error)));
  // Retourner au format compatible avec le reste du code
  const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
  return{content:[{type:'text',text}]};
}

function openPhotoOverlay(){

  document.getElementById('photo-result').style.display='none';

function closePhoto(){document.getElementById('photo-overlay').style.display='none';}

function handlePhotoSelected(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const dataUrl=e.target.result;
    const b64=dataUrl.split(',')[1];
    const mime=file.type||'image/jpeg';
    const prev=document.getElementById('photo-preview');
    prev.src=dataUrl;prev.style.display='block';
    document.getElementById('photo-result').style.display='none';
    document.getElementById('photo-status').textContent='🔍 Analyse en cours…';
    try{
      const data=await callAI([{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mime,data:b64}},
        {type:'text',text:'Analyse cette image. Si ce n\'est PAS un aliment ou un repas (objet, meuble, animal, personne, paysage, etc.), réponds UNIQUEMENT: {"error":"non_alimentaire"}. Sinon, estime les macros (légèrement pessimiste) et réponds UNIQUEMENT avec un JSON sans markdown: {"name":string (description courte en français, max 60 chars),"kcal":integer,"prot":integer,"gluc":integer,"lip":integer}'}
      ]}],500);
      const raw=data.content.map(i=>i.text||'').join('');
      const p=JSON.parse(raw.replace(/```json|```/g,'').trim());
      if(p.error){
        document.getElementById('photo-status').textContent='⚠ Ce n\u2019est pas un aliment — réessaie avec une photo de repas.';
        return;
      }
      document.getElementById('photo-name').value=p.name||'Repas photo';
      document.getElementById('photo-kcal').value=Math.round(p.kcal)||0;
      document.getElementById('photo-prot').value=Math.round(p.prot)||0;
      document.getElementById('photo-gluc').value=Math.round(p.gluc)||0;
      document.getElementById('photo-lip').value=Math.round(p.lip)||0;
      document.getElementById('photo-status').textContent='';
      document.getElementById('photo-result').style.display='block';
    }catch(err){
      document.getElementById('photo-status').textContent=
        err.message==='NO_KEY'?'⚠ Configure ta clé API (bouton ⚙)':"⚠ Erreur d'analyse — réessaie";
    }
  };
  reader.readAsDataURL(file);
}

function findItem(id){for(const arr of Object.values(S.inv)){const it=arr.find(i=>i.id===id);if(it)return it;}return null;}
function canCook(r,m=1){return(r.used||[]).every(({id,qty})=>{const it=findItem(id);return it&&(it.qty===null||it.qty>=qty*m);});}
function canTakeDessert(d){if(d.id==='none'||d.id==='autre')return true;const it=d.inv?findItem(d.inv):null;return!d.inv||(it&&it.qty>=d.qty);}
function weekCount(rid){let n=0;for(let i=0;i<=6;i++){const day=shiftDate(S.today,-i);n+=(S.dayMeals[day]||[]).filter(m=>m.rid===rid).length;}return n;}
function cookedToday(rid){return(S.dayMeals[S.today]||[]).some(m=>m.rid===rid);}
function getDessertMacros(dessert,cd){if(!dessert||dessert==='none')return{kcal:0,prot:0,gluc:0,lip:0};if(dessert==='autre'){if(cd&&!cd.error&&!cd.loading)return{kcal:cd.kcal||0,prot:cd.prot||0,gluc:cd.gluc||0,lip:cd.lip||0};return{kcal:0,prot:0,gluc:0,lip:0};}const d=DESSERTS.find(x=>x.id===dessert);return d?{kcal:d.kcal,prot:d.prot,gluc:d.gluc,lip:d.lip}:{kcal:0,prot:0,gluc:0,lip:0};}
function getDayMacros(day){return(S.dayMeals[day]||[]).reduce((acc,{rid,dessert,customDessert})=>{const r=RCP.find(x=>x.id===rid);if(!r)return acc;const dm=getDessertMacros(dessert,customDessert);return{kcal:acc.kcal+r.kcal+dm.kcal,prot:acc.prot+r.prot+dm.prot,gluc:acc.gluc+r.gluc+dm.gluc,lip:acc.lip+r.lip+dm.lip};},{kcal:0,prot:0,gluc:0,lip:0});}
function getMissingFor2(r){return(r.used||[]).filter(({id,qty})=>{const it=findItem(id);return it&&it.qty!==null&&it.qty>=qty&&it.qty<qty*2;}).map(({id,qty})=>{const it=findItem(id);return{name:it.name,have:it.qty,need:qty*2,unit:it.unit};});}

async function analyzeCustomDessert(rid,text){
  S.customDesserts[rid]={loading:true};render();
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,system:'Tu es nutritionniste. Réponds UNIQUEMENT avec un JSON valide (sans markdown): {"name":string,"kcal":integer,"prot":integer,"gluc":integer,"lip":integer}. Si non comestible: {"error":"non comestible"}.',messages:[{role:'user',content:text}]})});
    const data=await resp.json();const raw=data.content.map(i=>i.text||'').join('');const clean=raw.replace(/```json|```/g,'').trim();const p=JSON.parse(clean);
    S.customDesserts[rid]=p.error?{error:p.error}:{name:p.name||text,kcal:Math.round(p.kcal)||0,prot:Math.round(p.prot)||0,gluc:Math.round(p.gluc)||0,lip:Math.round(p.lip)||0};
  }catch(e){S.customDesserts[rid]={error:e.message==='NO_KEY'?'Configure ta clé API (⚙)':'Erreur — réessaie'};}
  render();
}

function execCook(rid,mult,day){
  const r=RCP.find(x=>x.id===rid);if(!r)return;
  (r.used||[]).forEach(({id,qty})=>{Object.values(S.inv).forEach(arr=>{const it=arr.find(i=>i.id===id);if(it&&it.qty!==null)it.qty=Math.max(0,it.qty-qty*mult);});});
  const dessertId=S.recipeDesserts[rid]||'none';const customD=dessertId==='autre'?S.customDesserts[rid]:null;
  if(dessertId!=='none'&&dessertId!=='autre'){const d=DESSERTS.find(x=>x.id===dessertId);if(d&&d.inv){Object.values(S.inv).forEach(arr=>{const it=arr.find(i=>i.id===d.inv);if(it&&it.qty!==null)it.qty=Math.max(0,it.qty-d.qty);});}}
  delete S.recipeDesserts[rid];delete S.customDesserts[rid];delete S.customInputs[rid];
  if(!S.dayMeals[day])S.dayMeals[day]=[];
  S.dayMeals[day].push({rid,mult:1,dessert:dessertId!=='none'?dessertId:null,customDessert:dessertId==='autre'&&customD&&!customD.loading&&!customD.error?customD:null});
  render();
  saveState();
}
function handleCook(rid,mult){const r=RCP.find(x=>x.id===rid);if(!r||!canCook(r,mult)||cookedToday(rid))return;const h=new Date().getHours();if(h<4){S.pendingCook={rid,mult};render();return;}execCook(rid,mult,S.today);}
function confirmDay(day){if(!S.pendingCook)return;const{rid,mult}=S.pendingCook;S.pendingCook=null;execCook(rid,mult,day);}

ROOT.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');if(!el||el.dataset.disabled==='true')return;
  const{action,val}=el.dataset;
  if(action==='main-tab')S.mainTab=val;
  else if(action==='meal-tab')S.mealTab=val;
  else if(action==='toggle-recipe')S.openRec=S.openRec===val?null:val;
  else if(action==='toggle-cat')S.openCat[val]=S.openCat[val]?0:1;
  else if(action==='select-dessert'){S.recipeDesserts[val]=el.dataset.dessert;if(el.dataset.dessert!=='autre'){delete S.customDesserts[val];delete S.customInputs[val];}}
  else if(action==='submit-custom-dessert'){const inp=document.querySelector(`[data-custom-input="${val}"]`);const txt=inp?inp.value.trim():S.customInputs[val]||'';if(txt)analyzeCustomDessert(val,txt);return;}
  else if(action==='prev-day'){const p=shiftDate(S.displayDate,-1);if(p>=shiftDate(S.today,-6))S.displayDate=p;}
  else if(action==='next-day'){const n=shiftDate(S.displayDate,1);if(n<=TOMORROW)S.displayDate=n;}
  else if(action==='delete-meal'){
    const day=el.dataset.day,idx=parseInt(el.dataset.idx);
    if(S.dayMeals[day]){S.dayMeals[day].splice(idx,1);saveState();}
  }
  else if(action==='cook'){handleCook(val,parseInt(el.dataset.mult||'1'));return;}
  else if(action==='confirm-day'){confirmDay(el.dataset.day);return;}
  render();
});

let _addMealInvSuggestions = [];
let _addMealInvMode = false;

function setInvMode(yes) {
  _addMealInvMode = yes;

  const nBtn = document.getElementById('inv-no-btn');

function buildInvContext() {
  return Object.values(S.inv).flatMap(arr =>
    arr.filter(it => it.qty === null || it.qty > 0)
       .map(it => `${it.id}|${it.name}|${it.qty??'illimité'}${it.unit}`)
  ).join(', ');
}

function renderInvSuggestions(suggestions) {
  const sec = document.getElementById('inv-items-section');
  if (!sec) return;
  let html = '';
  if (suggestions.length === 0) {
    html = '<div style="font-size:12px;color:#55556a;padding:4px 0 8px;">Aucun ingrédient identifié — ajoute-les manuellement si besoin.</div>';
  } else {
    html = suggestions.map((s, i) => {
      const it = findItem(s.id);
      if (!it) return '';
      return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid rgba(255,255,255,.05);">
        <input type="checkbox" id="inv-cb-${i}" checked style="width:16px;height:16px;cursor:pointer;flex-shrink:0;">
        <span style="flex:1;font-size:13px;color:#f0f0f2;">${it.name}</span>
        <input type="number" id="inv-qty-${i}" value="${s.qty}" min="0" style="width:62px;padding:4px 6px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:6px;color:#9898a8;font-size:12px;outline:none;text-align:right;">
        <span style="font-size:11px;color:#55556a;min-width:22px;">${s.unit}</span>
      </div>`;
    }).filter(Boolean).join('');
  }
  html += `<div id="inv-custom-items"></div>
  <button onclick="addCustomInvItem()" style="width:100%;padding:7px;margin-top:8px;background:transparent;border:0.5px dashed rgba(255,255,255,.1);border-radius:8px;color:#55556a;font-size:12px;cursor:pointer;">+ Ajouter manuellement</button>`;
  sec.innerHTML = html;
}

function addCustomInvItem() {
  const allItems = Object.values(S.inv).flatMap(arr => arr.filter(it => it.qty === null || it.qty > 0));
  const opts = allItems.map(it => `<option value="${it.id}">${it.name}${it.qty!==null?' ('+it.qty+it.unit+')':''}</option>`).join('');
  const idx = 'c' + Date.now();
  const row = document.createElement('div');
  row.id = `inv-row-${idx}`;
  row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid rgba(255,255,255,.05);';
  row.innerHTML = `<input type="checkbox" id="inv-cb-${idx}" checked style="width:16px;height:16px;cursor:pointer;flex-shrink:0;">
    <select id="inv-sel-${idx}" style="flex:1;padding:5px 6px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:6px;color:#f0f0f2;font-size:12px;outline:none;">${opts}</select>
    <input type="number" id="inv-qty-${idx}" placeholder="qté" style="width:62px;padding:4px 6px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:6px;color:#9898a8;font-size:12px;outline:none;text-align:right;">
    <button onclick="this.closest('[id^=inv-row]').remove()" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:15px;line-height:1;padding:0 2px;">✕</button>`;
  document.getElementById('inv-custom-items').appendChild(row);
}

async function startAddMealAnalysis(type) {
  if (type === 'photo') {
    document.getElementById('addmeal-photo-input').value = '';
    document.getElementById('addmeal-photo-input').click();
    return;
  }
  const text = document.getElementById('addmeal-textarea').value.trim();
  if (!text) return;
  document.getElementById('addmeal-input').style.display = 'none';
  document.getElementById('addmeal-analyzing').style.display = 'block';
  await runAddMealAI([{role:'user', content:text}]);
}

async function handleAddMealPhoto(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const dataUrl = e.target.result;
    const b64 = dataUrl.split(',')[1];
    const mime = file.type || 'image/jpeg';
    const prev = document.getElementById('addmeal-photo-preview');
    prev.src = dataUrl; prev.style.display = 'block';
    document.getElementById('addmeal-input').style.display = 'none';
    document.getElementById('addmeal-analyzing').style.display = 'block';
    await runAddMealAI([{role:'user', content:[
      {type:'image', source:{type:'base64', media_type:mime, data:b64}},
      {type:'text', text:'Analyse ce repas.'}
    ]}]);
  };
  reader.readAsDataURL(file);
}

async function runAddMealAI(msgs) {
  const sys = `Tu analyses un repas et estimes ses macros.
Inventaire disponible (format id|nom|quantité): ${buildInvContext()}
Réponds UNIQUEMENT avec un JSON valide sans markdown:
{"name":string,"kcal":integer,"prot":integer,"gluc":integer,"lip":integer,"inv_suggestions":[{"id":string,"name":string,"qty":number,"unit":string}]}
Pour inv_suggestions: inclus UNIQUEMENT les items de l'inventaire utilisés dans ce repas (par leur id exact). Laisse [] si aucun.
Sois légèrement pessimiste sur les calories/quantités.`;
  try {
    const data = await callAI(msgs, 600, sys);
    const raw = data.content.map(i=>i.text||'').join('');
    const p = JSON.parse(raw.replace(/```json|```/g,'').trim());
    document.getElementById('addmeal-name').value = p.name || 'Repas';
    document.getElementById('addmeal-kcal').value = Math.round(p.kcal)||0;
    document.getElementById('addmeal-prot').value = Math.round(p.prot)||0;
    document.getElementById('addmeal-gluc').value = Math.round(p.gluc)||0;
    document.getElementById('addmeal-lip').value = Math.round(p.lip)||0;
    _addMealInvSuggestions = p.inv_suggestions || [];
    document.getElementById('addmeal-analyzing').style.display = 'none';
    document.getElementById('addmeal-confirm').style.display = 'block';
    renderInvSuggestions(_addMealInvSuggestions);
    setInvMode(_addMealInvSuggestions.length > 0);
  } catch(err) {
    document.getElementById('addmeal-analyzing').style.display = 'none';
    document.getElementById('addmeal-input').style.display = 'block';
    const ta = document.getElementById('addmeal-textarea');
    ta.placeholder = err.message === 'NO_KEY'
      ? "⚠ Configure ta clé API d'abord (bouton ⚙)"
      : "⚠ Erreur — réessaie";
  }
}

function confirmAddMealFinal() {
  const name = document.getElementById('addmeal-name').value.trim() || 'Repas libre';
  const kcal = parseInt(document.getElementById('addmeal-kcal').value)||0;
  const prot = parseInt(document.getElementById('addmeal-prot').value)||0;
  const gluc = parseInt(document.getElementById('addmeal-gluc').value)||0;
  const lip  = parseInt(document.getElementById('addmeal-lip').value)||0;

  if (_addMealInvMode) {
    // Deduct AI-suggested items
    _addMealInvSuggestions.forEach((s, i) => {
      const cb = document.getElementById(`inv-cb-${i}`);
      const qi = document.getElementById(`inv-qty-${i}`);
      if (cb?.checked && qi) {
        const qty = parseFloat(qi.value)||0;
        if (qty > 0) Object.values(S.inv).forEach(arr => {
          const it = arr.find(x=>x.id===s.id);
          if (it && it.qty!==null) it.qty = Math.max(0, it.qty - qty);
        });
      }
    });
    // Deduct custom items
    document.querySelectorAll('#inv-custom-items [id^="inv-row-"]').forEach(row => {
      const idx = row.id.replace('inv-row-','');
      const cb  = document.getElementById(`inv-cb-${idx}`);
      const sel = document.getElementById(`inv-sel-${idx}`);
      const qi  = document.getElementById(`inv-qty-${idx}`);
      if (cb?.checked && sel && qi) {
        const qty = parseFloat(qi.value)||0;
        if (qty > 0) Object.values(S.inv).forEach(arr => {
          const it = arr.find(x=>x.id===sel.value);
          if (it && it.qty!==null) it.qty = Math.max(0, it.qty - qty);
        });
      }
    });
  }

  const id = '_free_' + Date.now();
  RCP.push({id, slots:[], name, kcal, prot, gluc, lip, steps:[], used:[], extras:[]});
  if (!S.dayMeals[S.today]) S.dayMeals[S.today] = [];
  S.dayMeals[S.today].push({rid:id, mult:1, dessert:null, customDessert:null});
  saveState();
  closeAddMeal();
  render();
}

      ]}],500);
      const p=JSON.parse(data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim());
      if(p.error){showFreeStep('input');alert("\u26a0\ufe0f Ce n'est pas un aliment — prends une photo de ton repas.");return;}
      fillFreeReview(p.name,p.kcal,p.prot,p.gluc,p.lip);
      showFreeStep('review');
    }catch(e){
      showFreeStep('input');
      if(e.message!=='NO_KEY'){
        const detail=e.message.startsWith('API:')?e.message.slice(4):e.message.startsWith('NETWORK:')?'Erreur réseau':e.message;
        showFreeStep('input');
        document.getElementById('free-text').value='';
        document.getElementById('photo-status')||0;
        alert('\u26a0\ufe0f '+detail);
      }
    }
  };
  reader.readAsDataURL(file);
}
function toggleFreeInv(){
  const show=document.getElementById('free-use-inv').checked;
  document.getElementById('free-inv-box').style.display=show?'block':'none';
  if(show)renderFreeInv();
}
function renderFreeInv(){
  const q=(document.getElementById('free-inv-search').value||'').toLowerCase();
  const items=Object.values(S.inv).flat().filter(it=>it.qty!==null&&it.qty>0&&(!q||it.name.toLowerCase().includes(q)));
  document.getElementById('free-inv-list').innerHTML=items.length?items.map(it=>`
    <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-top:0.5px solid rgba(255,255,255,.06);">
      <input type="checkbox" id="icb-${it.id}" onchange="toggleInvCb('${it.id}',this.checked)" style="accent-color:#4ade80;cursor:pointer;flex-shrink:0;">
      <span style="flex:1;font-size:12px;color:#9898a8;">${it.name}</span>
      <span style="font-size:11px;color:#55556a;">${it.qty}${it.unit}</span>
      <input type="number" id="iqty-${it.id}" value="" placeholder="qté" min="0" max="${it.qty}" style="width:58px;padding:3px 6px;background:#0f0f11;border:0.5px solid rgba(255,255,255,.1);border-radius:6px;color:#f0f0f2;font-size:12px;outline:none;display:none;box-sizing:border-box;">
    </div>`).join(''):'<div style="padding:12px;font-size:12px;color:#55556a;text-align:center;">Aucun résultat</div>';
}
function toggleInvCb(id,on){
  const el=document.getElementById('iqty-'+id);
  if(el)el.style.display=on?'block':'none';
}
function confirmFreeEntry(){
  const name=document.getElementById('free-name').value.trim()||'Repas libre';
  const kcal=parseInt(document.getElementById('free-kcal').value)||0;
  const prot=parseInt(document.getElementById('free-prot').value)||0;
  const gluc=parseInt(document.getElementById('free-gluc').value)||0;
  const lip=parseInt(document.getElementById('free-lip').value)||0;
  const id='_free_'+Date.now();
  RCP.push({id,slots:[],name,kcal,prot,gluc,lip,steps:[],used:[],extras:[]});
  if(!S.dayMeals[S.today])S.dayMeals[S.today]=[];
  S.dayMeals[S.today].push({rid:id,mult:1,dessert:null,customDessert:null});
  // Deduct inventory if requested
  if(document.getElementById('free-use-inv').checked){
    Object.values(S.inv).flat().forEach(it=>{
      const cb=document.getElementById('icb-'+it.id);
      const qEl=document.getElementById('iqty-'+it.id);
      if(cb&&cb.checked&&qEl){
        const q=parseFloat(qEl.value)||0;
        if(q>0&&it.qty!==null)it.qty=Math.max(0,it.qty-q);
      }
    });
  }
  saveState();
  closeFreeOverlay();
  render();
}

</script>
